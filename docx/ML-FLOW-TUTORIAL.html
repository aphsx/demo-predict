<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Moby ML Flow — Follow One Customer Tutorial</title>
<style>
:root{
  --bg:#04081c; --bg2:#0a1530; --bg3:#0f1c3a;
  --line:#1a2848; --line2:#243859;
  --t1:#d4e4ff; --t2:#7a92b8; --t3:#3a5278; --t4:#1e3050;
  --acc:#60a5fa;
  --ely:#a78bfa; --py:#fbbf24; --pg:#38bdf8; --wk:#34d399; --red:#fb7185; --pink:#f472b6;
  --gh:#94a3b8; --ch:#fb7185; --af:#fbbf24; --ap:#34d399;
  --mono:'SF Mono','Menlo','Monaco','Courier New',monospace;
  --sans:-apple-system,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);
  display:flex;flex-direction:column;font-size:13px;line-height:1.45}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:linear-gradient(rgba(26,40,72,.4) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(26,40,72,.4) 1px,transparent 1px);
  background-size:42px 42px}

/* ─── HEADER ─── */
header{flex-shrink:0;display:flex;align-items:center;gap:0;
  background:rgba(4,8,28,.96);border-bottom:1px solid var(--line);
  padding:0 18px;height:54px;z-index:50;backdrop-filter:blur(12px)}
.brand{font-family:var(--mono);font-size:11px;font-weight:800;color:var(--wk);
  letter-spacing:.1em;margin-right:18px;white-space:nowrap;display:flex;align-items:center;gap:8px}
.brand .dot{width:7px;height:7px;background:var(--wk);border-radius:50%;
  box-shadow:0 0 10px var(--wk);animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.brand-sub{color:var(--t3);font-weight:600;letter-spacing:.05em}

.steps{display:flex;gap:1px;overflow-x:auto;flex:1;scrollbar-width:none;padding:0 4px}
.steps::-webkit-scrollbar{display:none}
.step{padding:6px 11px;font-size:10.5px;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;cursor:pointer;color:var(--t3);border-radius:5px;
  border:1px solid transparent;white-space:nowrap;transition:all .2s;
  display:flex;align-items:center;gap:6px;font-family:var(--mono)}
.step:hover{color:var(--t2);border-color:var(--line2);background:var(--bg2)}
.step.on{color:#000;background:var(--acc);border-color:var(--acc);box-shadow:0 0 16px rgba(96,165,250,.45)}
.step.done{color:var(--wk)}
.step-n{font-size:9px;opacity:.7}
.step.on .step-n{opacity:1}

.controls{display:flex;gap:6px;margin-left:14px;flex-shrink:0}
.btn{padding:6px 13px;font-size:11px;font-weight:800;cursor:pointer;
  border-radius:5px;border:1px solid;background:transparent;
  font-family:var(--mono);letter-spacing:.04em;transition:.2s}
.btn-play{color:var(--acc);border-color:rgba(96,165,250,.4)}
.btn-play:hover{background:rgba(96,165,250,.12)}
.btn-play.playing{background:var(--acc);color:#000}
.btn-nav{color:var(--t2);border-color:var(--line2)}
.btn-nav:hover:not(:disabled){background:var(--bg3);color:var(--t1)}
.btn-nav:disabled{opacity:.25;cursor:not-allowed}

/* ─── PROGRESS BAR ─── */
#prog{flex-shrink:0;height:2px;background:var(--line);position:relative;overflow:hidden}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--wk));
  width:0;transition:width .45s ease}

/* ─── MAIN LAYOUT ─── */
main{flex:1;display:grid;grid-template-columns:1fr 380px;overflow:hidden;position:relative;z-index:1}
@media(max-width:1100px){main{grid-template-columns:1fr 320px}}
@media(max-width:880px){main{grid-template-columns:1fr;grid-template-rows:1fr 280px}}

/* ── LEFT: VISUAL CANVAS ── */
#stage{position:relative;overflow:hidden;background:var(--bg);display:flex;flex-direction:column}
#stage-head{padding:18px 26px 14px;border-bottom:1px solid var(--line);background:var(--bg2)}
.s-label{font-family:var(--mono);font-size:10px;font-weight:800;letter-spacing:.12em;
  text-transform:uppercase;color:var(--acc);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.s-label::before{content:'//';opacity:.45}
.s-title{font-size:20px;font-weight:900;letter-spacing:-.02em;margin-bottom:5px}
.s-sub{font-size:12.5px;color:var(--t2);line-height:1.55;max-width:680px}

#stage-body{flex:1;position:relative;overflow:auto;padding:24px 26px}
#stage-body::-webkit-scrollbar{width:6px}
#stage-body::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
#stage-body::-webkit-scrollbar-track{background:var(--bg)}

/* ── RIGHT: INSPECTOR PANEL ── */
#inspect{border-left:1px solid var(--line);background:var(--bg2);
  overflow-y:auto;display:flex;flex-direction:column}
#inspect::-webkit-scrollbar{width:5px}
#inspect::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

.ins-card{padding:14px 16px;border-bottom:1px solid var(--line)}
.ins-h{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t3);margin-bottom:9px;display:flex;align-items:center;gap:6px;font-family:var(--mono)}
.ins-h .tag{margin-left:auto;font-size:9px;padding:2px 7px;border-radius:3px;
  background:var(--bg3);border:1px solid var(--line2);color:var(--t2)}

.kv{display:flex;justify-content:space-between;padding:4px 0;font-size:11.5px;
  border-bottom:1px solid rgba(36,56,89,.4);gap:10px}
.kv:last-child{border-bottom:none}
.kv-k{color:var(--t2);flex-shrink:0;font-size:11px}
.kv-v{font-family:var(--mono);color:var(--t1);text-align:right;
  word-break:break-all;font-size:10.5px}
.kv-v.bad{color:var(--red)}
.kv-v.good{color:var(--wk)}
.kv-v.new{color:var(--acc);background:rgba(96,165,250,.1);padding:1px 6px;border-radius:3px}

.code{background:#020514;border:1px solid var(--line);border-radius:6px;
  padding:11px 13px;font-family:var(--mono);font-size:10.5px;line-height:1.7;
  color:var(--t2);overflow-x:auto;white-space:pre;margin-top:6px}
.code .kw{color:#c084fc}
.code .fn{color:#7dd3fc}
.code .str{color:#86efac}
.code .num{color:#fbbf24}
.code .cm{color:var(--t3);font-style:italic}
.code .hl{background:rgba(251,191,36,.12);border-radius:2px}

/* ── BIG-VISUAL PRIMITIVES ── */
.flow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}
.box{background:var(--bg2);border:1px solid var(--line2);border-radius:9px;
  padding:13px 16px;font-family:var(--mono);min-width:130px;position:relative;transition:.3s}
.box.hi{border-color:var(--acc);box-shadow:0 0 24px rgba(96,165,250,.25);
  background:linear-gradient(180deg,var(--bg2),rgba(96,165,250,.06))}
.box .b-lbl{font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.box .b-val{font-size:12px;font-weight:700;color:var(--t1)}
.box .b-tag{position:absolute;top:-9px;left:12px;font-size:8.5px;font-weight:800;
  padding:2px 7px;border-radius:3px;letter-spacing:.06em;text-transform:uppercase}

.arr{width:38px;height:2px;background:linear-gradient(90deg,var(--line2),var(--acc));position:relative;flex-shrink:0}
.arr::after{content:'';position:absolute;right:-4px;top:-4px;
  border:5px solid transparent;border-left-color:var(--acc)}
.arr-lbl{position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  font-size:9.5px;color:var(--acc);font-family:var(--mono);white-space:nowrap;
  background:var(--bg);padding:1px 6px;border-radius:3px;border:1px solid var(--line)}

/* Sheet table */
.sheet{background:var(--bg2);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:14px}
.sheet-head{padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--line);
  font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--py);
  letter-spacing:.04em;display:flex;align-items:center;gap:8px}
.sheet-head .badge{font-size:9px;padding:1px 6px;border-radius:3px;
  background:rgba(251,191,36,.12);color:var(--py);border:1px solid rgba(251,191,36,.3)}
.sheet table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10.5px}
.sheet th{background:var(--bg);color:var(--t2);font-weight:600;padding:7px 10px;
  text-align:left;border-bottom:1px solid var(--line);font-size:9.5px;
  letter-spacing:.05em;text-transform:uppercase}
.sheet td{padding:6px 10px;border-bottom:1px solid var(--line);color:var(--t1)}
.sheet tr:last-child td{border-bottom:none}
.sheet tr.us{background:rgba(96,165,250,.06)}
.sheet tr.us td{color:var(--acc)}
.cell-bad{color:var(--red);text-decoration:line-through;opacity:.6}
.cell-good{color:var(--wk);font-weight:700}
.cell-tx{background:rgba(167,139,250,.12);color:var(--ely);font-weight:700;padding:1px 5px;border-radius:3px}

/* Lifecycle tree */
.tree{display:flex;flex-direction:column;gap:10px;font-family:var(--mono);font-size:11px;max-width:560px;margin:0 auto}
.tnode{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:6px;
  background:var(--bg2);border:1px solid var(--line2)}
.tnode.lit{border-color:var(--acc);background:rgba(96,165,250,.1)}
.tnode.path{border-color:var(--wk);background:rgba(52,211,153,.08)}
.tnode .cond{flex:1;color:var(--t1)}
.tnode .ans{font-size:9.5px;padding:2px 7px;border-radius:3px;
  background:var(--bg3);color:var(--t2);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.tnode.path .ans{background:rgba(52,211,153,.18);color:var(--wk);border:1px solid rgba(52,211,153,.3)}
.tnode .br{width:20px;color:var(--t3)}

/* Models grid */
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:11px;margin-bottom:14px}
.mod{background:var(--bg2);border:1px solid var(--line2);border-radius:9px;
  padding:12px 14px;position:relative;transition:.3s}
.mod.active{border-color:var(--wk);background:linear-gradient(180deg,var(--bg2),rgba(52,211,153,.06))}
.mod.skip{opacity:.4}
.mod-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mod-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;
  justify-content:center;font-size:13px;flex-shrink:0}
.mod-name{font-size:11.5px;font-weight:800;letter-spacing:-.01em}
.mod-bucket{font-size:9px;font-family:var(--mono);color:var(--t3);
  margin-top:1px;letter-spacing:.06em;text-transform:uppercase}
.mod-out{font-family:var(--mono);font-size:11px;color:var(--t2);
  padding-top:8px;border-top:1px solid var(--line);margin-top:6px}
.mod-out span{color:var(--acc);font-weight:700}

/* Pills / chips */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;
  font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.04em;
  border:1px solid;margin-right:4px;margin-bottom:4px}
.pill.next{color:#00d4ff;border-color:rgba(0,212,255,.35);background:rgba(0,212,255,.06)}
.pill.ely{color:var(--ely);border-color:rgba(167,139,250,.35);background:rgba(167,139,250,.06)}
.pill.py{color:var(--py);border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.06)}
.pill.pg{color:var(--pg);border-color:rgba(56,189,248,.35);background:rgba(56,189,248,.06)}
.pill.wk{color:var(--wk);border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.06)}

/* Feature grid (30 features visual) */
.fgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:14px 0}
.f{padding:6px 8px;border-radius:5px;font-family:var(--mono);font-size:9.5px;
  background:var(--bg2);border:1px solid var(--line);position:relative;text-align:center;transition:.2s}
.f.user{border-color:rgba(167,139,250,.3)}
.f.pay{border-color:rgba(251,191,36,.3)}
.f.use{border-color:rgba(52,211,153,.3)}
.f.flash{animation:flash 1.2s ease-out}
@keyframes flash{0%{background:var(--acc);color:#000;transform:scale(1.08)}
  100%{background:var(--bg2);color:var(--t1)}}
.f .fk{color:var(--t3);font-size:8.5px;margin-bottom:2px;letter-spacing:.04em}
.f .fv{color:var(--t1);font-weight:700;font-size:11px}

/* Highlight */
.hl-row{background:linear-gradient(90deg,rgba(96,165,250,.08),transparent);
  border-left:2px solid var(--acc);padding:8px 12px;margin:10px 0;border-radius:0 5px 5px 0;
  font-family:var(--mono);font-size:11.5px}
.hl-row b{color:var(--acc)}

/* Cleansing diff */
.diff{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;
  margin:14px 0;padding:14px;background:var(--bg2);border:1px solid var(--line);border-radius:8px}
.diff-side{font-family:var(--mono);font-size:10.5px}
.diff-side h4{font-size:9.5px;color:var(--t3);margin-bottom:8px;
  letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.diff-side .ln{padding:3px 8px;border-radius:3px;margin-bottom:3px}
.diff-side.b .ln{background:rgba(251,113,133,.08);color:var(--red)}
.diff-side.a .ln{background:rgba(52,211,153,.08);color:var(--wk)}
.diff-arr{color:var(--acc);font-size:18px;font-family:var(--mono)}

/* Final prediction card */
.pred{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.pcard{background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:12px 14px}
.pc-l{font-size:9.5px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;
  font-family:var(--mono);margin-bottom:6px}
.pc-v{font-size:20px;font-weight:900;letter-spacing:-.02em;font-family:var(--mono)}
.pc-v.green{color:var(--wk)}
.pc-v.blue{color:var(--acc)}
.pc-v.pink{color:var(--pink)}
.pc-v.yellow{color:var(--py)}
.pc-v.red{color:var(--red)}
.pc-sub{font-size:10px;color:var(--t2);margin-top:4px;font-family:var(--mono)}

/* Stream events */
.stream{font-family:var(--mono);font-size:10.5px;background:#020514;
  border:1px solid var(--line);border-radius:6px;padding:12px;line-height:1.8}
.ev{display:flex;gap:10px;padding:2px 0}
.ev-t{color:var(--wk);font-weight:700}
.ev-k{color:var(--py)}
.ev-v{color:var(--t1)}

/* fade-in */
.fade{animation:fade .5s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Tooltip caption above stage */
.callout{background:linear-gradient(180deg,var(--bg2),var(--bg3));
  border:1px solid var(--line2);border-radius:8px;padding:12px 14px;
  margin-bottom:16px;display:flex;gap:12px;align-items:flex-start}
.callout-i{font-size:22px;flex-shrink:0}
.callout-b{flex:1;font-size:12px;line-height:1.6;color:var(--t1)}
.callout-b b{color:var(--acc)}
.callout-b code{font-family:var(--mono);font-size:11px;background:var(--bg);
  padding:1px 5px;border-radius:3px;color:var(--py);border:1px solid var(--line)}

.section-t{font-size:11px;font-weight:800;color:var(--t3);letter-spacing:.1em;
  text-transform:uppercase;margin:18px 0 9px;font-family:var(--mono);
  display:flex;align-items:center;gap:8px}
.section-t::before{content:'';width:14px;height:1px;background:var(--line2)}
.section-t::after{content:'';flex:1;height:1px;background:var(--line2)}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot"></span>
    <span>MOBY · ML FLOW</span>
    <span class="brand-sub">/ FOLLOW acc_id=42</span>
  </div>
  <div class="steps" id="steps"></div>
  <div class="controls">
    <button class="btn btn-nav" id="prev">← Prev</button>
    <button class="btn btn-play" id="play">▶ Auto-play</button>
    <button class="btn btn-nav" id="next">Next →</button>
  </div>
</header>

<div id="prog"><div id="prog-fill"></div></div>

<main>
  <section id="stage">
    <div id="stage-head">
      <div class="s-label" id="s-label">Step 1 of 8</div>
      <h1 class="s-title" id="s-title">Stage title</h1>
      <p class="s-sub" id="s-sub">Stage subtitle</p>
    </div>
    <div id="stage-body"></div>
  </section>

  <aside id="inspect"></aside>
</main>

<script>
/* ════════════════════════════════════════════════════════════════
   SAMPLE CUSTOMER — acc_id = 42
   The same row threads through every stage; we mutate it visually.
   ════════════════════════════════════════════════════════════════ */
const CUSTOMER = {
  acc_id: 42,
  // Excel raw cells (what was typed by user / exported from their system)
  excel: {
    user_row: {
      "acc_id": 42,
      "status (SMS)": "PAID",
      "user.credit + user.credit_premium": "23466015",   // string in Excel
      "credit_email": null,                              // empty cell
      "expire": "2025-12-31",
      "expire_email": "",                                // blank string
      "status (Email)": "FREE",
      "join_date": "2024-01-15",
      "last_access": "2025-06-22 14:03:11",
      "last_send":  "2025-06-22 14:03:09",
      "__EMPTY_1":  null,                                // Excel ghost col
    },
    payments: [
      { uid: 8001, payment_date: "2024-03-10", acc_id: 42, credit_add: 5000, amount: 1500, credit_type: "sms" },
      { uid: 8202, payment_date: "2024-08-25", acc_id: 42, credit_add: 10000, amount: 2900, credit_type: "sms" },
      { uid: 8455, payment_date: "2025-01-12", acc_id: 42, credit_add: 10000, amount: 2900, credit_type: "sms" },
      { uid: 8702, payment_date: "2025-04-20", acc_id: 42, credit_add: 20000, amount: 5500, credit_type: "sms" },
      { uid: 8801, payment_date: null,         acc_id: 42, credit_add: 0,     amount: 0,    credit_type: "sms" }, // bad row → skipped
    ],
    usage: [
      { sheet:"SMS_usage (BC)",  year:2025, month:4, acc_id:42, usage: 1800 },
      { sheet:"SMS_usage (API)", year:2025, month:4, acc_id:42, usage: 950  },
      { sheet:"SMS_usage (BC)",  year:2025, month:5, acc_id:42, usage: 2100 },
      { sheet:"SMS_usage (API)", year:2025, month:5, acc_id:42, usage: 880  },
      { sheet:"SMS_usage (BC)",  year:2025, month:6, acc_id:42, usage: 2400 },
      { sheet:"SMS_usage (BC)",  year:2025, month:6, acc_id:42, usage: 2400 }, // dup → dedup'd
    ],
  },
};

const CUTOFF = "2025-07-01";

/* ════════════════════════════════════════════════════════════════
   8 STAGES — each is rendered as a function returning HTML
   ════════════════════════════════════════════════════════════════ */
const STAGES = [
  /* ─── 1. Excel arrives ────────────────────────────────────── */
  {
    key:"excel",
    label:"Excel In",
    icon:"📥",
    title:"User uploads an Excel file with 8 sheets",
    sub:"The browser POSTs the .xlsx to Elysia. Nothing has been touched yet — it's just raw bytes that XLSX.js will turn into JSON.",
    pill:"next",
    body: () => `
<div class="callout">
  <div class="callout-i">📑</div>
  <div class="callout-b">
    <b>Fixed schema:</b> the file must contain a sheet called
    <code>Users+User_profile</code> plus <code>Backend_payment</code>.
    The 6 usage sheets are optional but expected.
    We zoom in on <b>acc_id = 42</b> and follow them all the way to a saved prediction row.
  </div>
</div>

<div class="sheet">
  <div class="sheet-head">🟡 Users+User_profile <span class="badge">REQUIRED</span> <span style="color:var(--t3);margin-left:auto">1 row per customer</span></div>
  <table>
    <thead><tr>
      <th>acc_id</th><th>status (SMS)</th><th>user.credit + user.credit_premium</th>
      <th>credit_email</th><th>expire</th><th>join_date</th><th>last_send</th>
    </tr></thead>
    <tbody>
      <tr><td>17</td><td>FREE</td><td>0</td><td>—</td><td>—</td><td>2024-08-02</td><td>2025-01-04 10:21</td></tr>
      <tr class="us"><td>42</td><td>PAID</td><td>"23466015"</td><td class="cell-bad">∅ null</td>
        <td>2025-12-31</td><td>2024-01-15</td><td>2025-06-22 14:03:09</td></tr>
      <tr><td>91</td><td>PAID</td><td>120000</td><td>5000</td><td>2026-02-01</td><td>2023-05-10</td><td>2025-06-30 09:11</td></tr>
    </tbody>
  </table>
</div>

<div class="sheet">

/* ════════════════════════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════════════════════════ */
let current = 0;
let playing = false;
let playTimer = null;

const $ = (id) => document.getElementById(id);
const stepsEl  = $("steps");
const stageBody= $("stage-body");
const inspect  = $("inspect");
const sLabel   = $("s-label");
const sTitle   = $("s-title");
const sSub     = $("s-sub");
const progFill = $("prog-fill");
const playBtn  = $("play");
const prevBtn  = $("prev");
const nextBtn  = $("next");

function buildStepTabs(){
  stepsEl.innerHTML = STAGES.map((s,i)=>
    `<div class="step" data-i="${i}"><span class="step-n">${String(i+1).padStart(2,'0')}</span>
       <span>${s.icon}</span> <span>${s.label}</span></div>`
  ).join("");
  stepsEl.querySelectorAll(".step").forEach(el=>{
    el.addEventListener("click",()=>go(+el.dataset.i));
  });
}

function render(){
  const s = STAGES[current];

  // tabs
  stepsEl.querySelectorAll(".step").forEach((el,i)=>{
    el.classList.toggle("on",  i===current);
    el.classList.toggle("done", i<current);
  });

  // head
  sLabel.textContent = `Step ${current+1} of ${STAGES.length} · ${s.label}`;
  sTitle.textContent = s.title;
  sSub.textContent   = s.sub;

  // body
  stageBody.innerHTML = `<div class="fade">${s.body()}</div>`;
  inspect.innerHTML   = `<div class="fade">${s.inspect()}</div>`;

  // animate feature grid if on features step
  if(s.key==="features"){
    const cells=document.querySelectorAll("#fgrid .f");
    cells.forEach((c,i)=>setTimeout(()=>c.classList.add("flash"),i*30));
  }

  // progress
  progFill.style.width = `${((current+1)/STAGES.length)*100}%`;

  // nav buttons
  prevBtn.disabled = current===0;
  nextBtn.disabled = current===STAGES.length-1;
}

function go(i){
  if(i<0||i>=STAGES.length)return;
  current=i;
  render();
}

function next(){
  if(current<STAGES.length-1){go(current+1);}
  else{stopPlay();}
}

function startPlay(){
  playing=true;
  playBtn.classList.add("playing");
  playBtn.textContent="⏸ Pause";
  playTimer=setInterval(()=>{
    if(current>=STAGES.length-1){stopPlay();return}
    next();
  },5000);
}
function stopPlay(){
  playing=false;
  playBtn.classList.remove("playing");
  playBtn.textContent="▶ Auto-play";
  if(playTimer){clearInterval(playTimer);playTimer=null}
}
playBtn.addEventListener("click",()=>playing?stopPlay():startPlay());
prevBtn.addEventListener("click",()=>go(current-1));
nextBtn.addEventListener("click",next);

// keyboard
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowRight"||e.key===" "){e.preventDefault();next()}
  else if(e.key==="ArrowLeft"){go(current-1)}
  else if(e.key>="1"&&e.key<="8"){go(+e.key-1)}
});

buildStepTabs();
render();
</script>
</body>
</html>
