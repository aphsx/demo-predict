version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-moby}
      POSTGRES_USER:     ${POSTGRES_USER:-moby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moby1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moby}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  ml:
    build: ./ml
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./ml/models:/app/models
      - ./ml/data:/app/data
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-moby}:${POSTGRES_PASSWORD:-moby1234}@db:5432/${POSTGRES_DB:-moby}
      MODEL_DIR:    /app/models
      REDIS_HOST:   redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./ml
    restart: unless-stopped
    command: python -m arq worker.predict_worker.WorkerSettings
    volumes:
      - ./ml/models:/app/models
      - ./ml/data:/app/data
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-moby}:${POSTGRES_PASSWORD:-moby1234}@db:5432/${POSTGRES_DB:-moby}
      MODEL_DIR:    /app/models
      REDIS_HOST:   redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT:                "3001"
      NEXT_PUBLIC_API_URL: http://localhost:8001
      API_URL:             http://ml:8000
    depends_on:
      - ml

volumes:
  postgres_data:
