services:
  db:
    # pgvector/pgvector:pg15 is the official Postgres 15 image with the `vector`
    # extension preinstalled (drop-in replacement for postgres:15-alpine).
    # Required by AI Chat v2 RAG (ai_knowledge_chunks.embedding).
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Single schema bootstrap. Runs only when postgres_data is first created.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  ml:
    build:
      context: ./apps/ml
      args:
        # CPU-only torch by default. For a GPU host: TORCH_VARIANT=cuda docker compose build ml
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8000"
    volumes:
      - ./models:/app/models
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3001"
    volumes:
      - ./models:/app/models   # needed for /model-metrics and /training-log
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ── Tailscale sidecar ──────────────────────────────────────────
  # Publishes the Next.js frontend (web:3000) to the internet via Tailscale
  # Funnel — no port-forwarding, no public IP, no firewall changes needed on
  # the university network (outbound-only connection). Only `web` is exposed;
  # db / redis / ml / api stay private on the Docker network.
  #
  # Runs in userspace-networking mode, so it needs NO NET_ADMIN / /dev/net/tun.
  # Setup: see tailscale/README.md (put TS_AUTHKEY in .env first).
  tailscale:
    image: tailscale/tailscale:stable
    hostname: ${TS_HOSTNAME:-moby-analytics}
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_HOSTNAME: ${TS_HOSTNAME:-moby-analytics}
      # Serve/Funnel definition (proxies https → web:3000). See tailscale/serve.json
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
      # Userspace networking: no privileged caps / TUN device required.
      TS_USERSPACE: "true"
      TS_EXTRA_ARGS: --advertise-tags=tag:moby
    volumes:
      - tailscale_state:/var/lib/tailscale
      - ./tailscale/serve.json:/config/serve.json:ro
    depends_on:
      - web

volumes:
  postgres_data:
  tailscale_state: