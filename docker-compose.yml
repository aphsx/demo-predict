version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: churn_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: churn_crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d churn_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: churn_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com  # เปลี่ยนจาก .local เป็น .com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8888:80"
  
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
